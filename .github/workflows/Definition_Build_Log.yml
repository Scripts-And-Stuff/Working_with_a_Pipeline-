# This is a basic workflow to help you get started with Actions

name: Definition_Build_Log

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it. 
      - uses: actions/checkout@v6
      - name: List repo files
        run: |
             echo "Branch: $GITHUB_REF"
             ls -R .

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      #Run powershell script to generate definitions
      - name: Output Commit Message word definitions to CSV
        shell: pwsh
        run: ./scripts/Lookup-Dictionary.ps1 -CommitMessage "${{ github.event.head_commit.message || github.event.pull_request.title }}" -BuildNumber "${{ github.run_number }}"
      
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the modified or new files
          git add ./Commit Message Word Definitions/BuildNumber${{ github.run_number }}.csv
          
          # Commit only if there are actual changes to prevent workflow failures
          git diff-index --quiet HEAD || git commit -m "chore: auto-update repository files"
          
          # Push changes back to the origin branch
          git push
